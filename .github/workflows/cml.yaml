name: model-training
on: [push]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: iterative/setup-cml@v1
      - uses: iterative/setup-dvc@v1

      - name: Install dependencies
        run: |
          pip install pandas xgboost scikit-learn matplotlib joblib

      - name: Train model
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # 1. Configura o acesso
          dvc remote modify origin --local user $DAGSHUB_USER
          dvc remote modify origin --local password $DAGSHUB_TOKEN
          
          # 2. Tenta puxar o dado bruto, mas não para se der erro
          dvc pull data/raw/weatherAUS.csv.dvc || true
          
          # 3. FORÇA a execução (ignorando o cache problemático)
          # Isso vai gerar o cleaned.csv e o model.pkl do zero no GitHub
          dvc repro -f 
          
          # 4. Gera o relatório
          echo "## 🚀 Relatório de Treino Automático (CML)" > report.md
          echo "Acurácia: $(cat metrics.json)" >> report.md
          echo "### 📉 Matriz de Confusão" >> report.md
          echo "![](./confusion_matrix.png)" >> report.md
          
          cml comment create report.md